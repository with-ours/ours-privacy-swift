name: Publish

on:
  pull_request:
    types: [closed]
    branches: [main]

  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 2.0.0)"
        required: true

permissions: {}

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    name: Build & Test
    runs-on: macos-latest
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.title, 'release:'))
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(echo "$PR_TITLE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          fi

          if [ -z "$VERSION" ]; then
            echo "Could not extract version"
            exit 1
          fi

          PLIST_VERSION=$(grep -A1 "CFBundleShortVersionString" Info.plist | tail -1 | sed -E 's/.*<string>([^<]+)<\/string>.*/\1/')
          if [ "$PLIST_VERSION" != "$VERSION" ]; then
            echo "Info.plist CFBundleShortVersionString ($PLIST_VERSION) does not match release version ($VERSION)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - run: swift build

      - run: swift test

  publish:
    name: Publish
    runs-on: macos-latest
    needs: build
    permissions:
      contents: write # push release tag, create GitHub release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ needs.build.outputs.sha }}

      - name: Create git tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ needs.build.outputs.version }}
        run: |
          git tag "$VERSION"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ needs.build.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes
