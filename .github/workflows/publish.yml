name: Publish

on:
  pull_request:
    types: [closed]
    branches: [main]

  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 2.0.0)"
        required: true

permissions: {}

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # Build + test runs without publish secrets so a malicious dep cannot
  # exfiltrate the CocoaPods trunk token. The publish job re-checks out
  # the same commit and runs `pod trunk push` in isolation.
  build:
    name: Build & Test
    runs-on: macos-latest
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.title, 'release:'))
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(echo "$PR_TITLE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          fi

          if [ -z "$VERSION" ]; then
            echo "Could not extract version"
            exit 1
          fi

          POD_VERSION=$(grep -oE "s\.version[[:space:]]*=[[:space:]]*['\"][^'\"]+['\"]" OursPrivacy-swift.podspec | grep -oE "[0-9]+\.[0-9]+\.[0-9]+[A-Za-z0-9.\-]*")
          if [ "$POD_VERSION" != "$VERSION" ]; then
            echo "OursPrivacy-swift.podspec version ($POD_VERSION) does not match release version ($VERSION)"
            echo "The PR must include the version bump in OursPrivacy-swift.podspec"
            exit 1
          fi

          PLIST_VERSION=$(grep -A1 "CFBundleShortVersionString" Info.plist | tail -1 | sed -E 's/.*<string>([^<]+)<\/string>.*/\1/')
          if [ "$PLIST_VERSION" != "$VERSION" ]; then
            echo "Info.plist CFBundleShortVersionString ($PLIST_VERSION) does not match release version ($VERSION)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - run: swift build

      - run: swift test

      - name: Lint podspec
        run: pod lib lint OursPrivacy-swift.podspec --allow-warnings

  # Publish runs in an isolated job. Tags the release for SPM consumers,
  # pushes the podspec to CocoaPods trunk, and cuts a GitHub release.
  publish:
    name: Publish
    runs-on: macos-latest
    needs: build
    permissions:
      contents: write # push release tag, create GitHub release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.build.outputs.sha }}

      - name: Create git tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ needs.build.outputs.version }}
        run: |
          git tag "$VERSION"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$VERSION"

      - name: Publish to CocoaPods trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push OursPrivacy-swift.podspec --allow-warnings

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ needs.build.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes
