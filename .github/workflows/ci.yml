name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Show Swift / Xcode versions
        run: |
          swift --version
          xcodebuild -version

      - name: swift test
        run: swift test

  build-ios:
    name: Build (iOS)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # The framework's Swift module is named `OursPrivacyKit`
      # (`PRODUCT_MODULE_NAME` + `PRODUCT_NAME`) while the public entry-point
      # class stays `OursPrivacy` for React Native parity. With the name
      # collision gone, library evolution can stay on — the `.swiftinterface`
      # verifier now passes — and CI exercises the same build configuration
      # as a release artifact.
      - name: xcodebuild build (iOS Simulator, arm64)
        run: |
          xcodebuild build \
            -project OursPrivacy.xcodeproj \
            -scheme OursPrivacy \
            -destination 'generic/platform=iOS Simulator' \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64
