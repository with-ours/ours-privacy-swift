name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Show Swift / Xcode versions
        run: |
          swift --version
          xcodebuild -version

      - name: swift test
        run: swift test

  build-ios:
    name: Build (iOS)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # The framework's Swift module is named `OursPrivacyKit`
      # (`PRODUCT_MODULE_NAME` + `PRODUCT_NAME`) while the public entry-point
      # class stays `OursPrivacy`. With the name collision gone, library
      # evolution stays on — the `.swiftinterface` verifier passes — and CI
      # exercises the same build configuration as a release artifact.
      - name: xcodebuild build (iOS Simulator, arm64)
        run: |
          xcodebuild build \
            -project OursPrivacy.xcodeproj \
            -scheme OursPrivacy \
            -destination 'generic/platform=iOS Simulator' \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64

  lint-podspec:
    name: Lint Podspec
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # `pod lib lint` exercises the podspec against the source tree the way
      # CocoaPods consumers will. Without this, the SPM + xcodeproj test paths
      # can be green while the podspec silently references stale file paths.
      - name: pod lib lint
        run: pod lib lint OursPrivacy-swift.podspec
