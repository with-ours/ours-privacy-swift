name: PR Title Validation

on:
  pull_request:
    types: [opened, synchronize, edited]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-title-check:
    name: PR Title Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Check PR Title Format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "PR Title: $PR_TITLE"
          echo "Base Branch: $BASE_BRANCH"

          # Extract the prefix part (everything before the first colon)
          PREFIX_PART=$(echo "$PR_TITLE" | cut -d: -f1)

          # Check for scoped format: prefix(scope)
          if [[ $PREFIX_PART == *"("*")"* ]]; then
            BASE_PREFIX="${PREFIX_PART%%(*}"
          else
            BASE_PREFIX="$PREFIX_PART"
          fi

          # Validate prefix
          case "$BASE_PREFIX" in
            fix|feat|chore|docs|test|refactor|perf|ci|build|revert|release)
              ;;
            *)
              echo "❌ PR title must start with a valid prefix"
              echo "Current title: $PR_TITLE"
              echo "Valid prefixes: fix:, feat:, chore:, docs:, test:, refactor:, perf:, ci:, build:, revert:, release:"
              exit 1
              ;;
          esac

          # Ensure space after colon
          if [[ ! $PR_TITLE =~ ^[a-z]+(\([a-z]+\))?:[[:space:]] ]]; then
            echo "❌ PR title must have a space after the colon"
            echo "Current title: $PR_TITLE"
            exit 1
          fi

          # For release PRs, validate version consistency across all files
          if [[ $BASE_PREFIX == "release" ]]; then
            VERSION=$(echo "$PR_TITLE" | grep -oP '\d+\.\d+\.\d+')
            if [ -z "$VERSION" ]; then
              echo "❌ Release PR title must include a semver version (e.g., release: 1.1.0)"
              exit 1
            fi

            echo "Checking version $VERSION across all files..."
            ERRORS=""

            # OursPrivacy-swift.podspec
            POD_VERSION=$(grep -oE "s\.version[[:space:]]*=[[:space:]]*['\"][^'\"]+['\"]" OursPrivacy-swift.podspec | grep -oE "[0-9]+\.[0-9]+\.[0-9]+[A-Za-z0-9.\-]*")
            if [ "$POD_VERSION" != "$VERSION" ]; then
              ERRORS="$ERRORS\n  - OursPrivacy-swift.podspec: found $POD_VERSION"
            fi

            # Info.plist CFBundleShortVersionString
            PLIST_VERSION=$(grep -A1 "CFBundleShortVersionString" Info.plist | tail -1 | sed -E 's/.*<string>([^<]+)<\/string>.*/\1/')
            if [ "$PLIST_VERSION" != "$VERSION" ]; then
              ERRORS="$ERRORS\n  - Info.plist: found $PLIST_VERSION"
            fi

            if [ -n "$ERRORS" ]; then
              echo "❌ Version mismatch! PR title says $VERSION but these files don't match:"
              echo -e "$ERRORS"
              echo ""
              echo "All version files must be updated to $VERSION before merging (OursPrivacy-swift.podspec, Info.plist)."
              exit 1
            fi

            echo "✅ Version $VERSION is consistent across all files (OursPrivacy-swift.podspec, Info.plist)"
          fi

          echo "✅ PR title format is valid"
