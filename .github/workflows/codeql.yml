name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full re-scan on Mondays 06:00 UTC. Catches advisories that
    # land in the CodeQL query packs between PR events.
    - cron: "0 6 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      security-events: write # upload SARIF to Code Scanning
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          languages: swift

      # Build via SPM rather than `autobuild` to dodge the OursPrivacy
      # module/class name collision that breaks xcodebuild's swiftinterface
      # verifier under library evolution. `swift build` is the same path
      # ci.yml's Test job uses.
      - name: Build (SPM)
        run: swift build

      - uses: github/codeql-action/analyze@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          category: "/language:swift"
